# =============================================================================
# Cart Agent Service - Kubernetes Manifests
# Namespace: pauric-test
#
# Replaces: cartservice Deployment + redis-cart Deployment/Service
# Adds:     ollama Deployment + Service (if not already deployed)
# =============================================================================

---
# -- Namespace (idempotent) ----------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: pauric-test

---
# -- ConfigMap for cart agent --------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: cartservice-agent-config
  namespace: pauric-test
data:
  OLLAMA_URL: "http://ollama:11434"
  OLLAMA_MODEL: "llama3.2:1b"
  PORT: "7070"

---
# -- Cart Agent Deployment -----------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cartservice
  namespace: pauric-test
  labels:
    app: cartservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cartservice
  template:
    metadata:
      labels:
        app: cartservice
    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 5
      containers:
        - name: server
          # TODO: replace with your actual image registry/tag after building
          image: YOUR_REGISTRY/cartservice-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7070
              name: grpc
          envFrom:
            - configMapRef:
                name: cartservice-agent-config
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            grpc:
              port: 7070
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            grpc:
              port: 7070
            initialDelaySeconds: 5
            periodSeconds: 5

---
# -- Cart Service (Service) ----------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: cartservice
  namespace: pauric-test
  labels:
    app: cartservice
spec:
  selector:
    app: cartservice
  ports:
    - name: grpc
      port: 7070
      targetPort: 7070
  type: ClusterIP

---
# -- Ollama Deployment ---------------------------------------------------------
# Skip this section if Ollama is already running in your cluster.
# Ensure llama3.2:1b is pulled before the cartservice starts (initContainer below handles this).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: pauric-test
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      initContainers:
        # Pull the model on first start so the cart agent doesn't time out
        - name: pull-model
          image: ollama/ollama:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              ollama serve &
              sleep 5
              ollama pull llama3.2:1b
              wait
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              name: http
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: ollama-data
          emptyDir: {}          # Replace with a PVC for model persistence across restarts

---
# -- Ollama Service ------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: pauric-test
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
      targetPort: 11434
  type: ClusterIP
